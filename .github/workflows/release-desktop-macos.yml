name: Release Desktop macOS

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Тип версии (minor для dev, major для main)'
        required: true
        type: choice
        options:
          - minor
          - major
  push:
    branches:
      - dev
    paths:
      - 'apps/desktop/**'
      - 'apps/shared/**'
      - 'agents/**'
      - 'skills/**'
      - 'rules/**'
      - 'commands/**'
      - 'agent/**'
      - 'scripts/build-desktop-macos.sh'
      - 'scripts/bump-desktop-version.sh'
      - 'scripts/desktop-signing-env.sh'
      - 'scripts/ensure-node.sh'
      - '.github/workflows/release-desktop-macos.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Runner diagnostics
        run: |
          sw_vers
          uname -m
          node --version 2>/dev/null || true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Определить тип bump
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "kind=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "kind=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: Поднять версию
        id: version
        run: |
          NEW="$(bash scripts/bump-desktop-version.sh "${{ steps.bump.outputs.kind }}")"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
          echo "Новая версия: v${NEW}"

      - name: Закоммитить версию
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json pyproject.toml hermes_cli/__init__.py
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Установить зависимости
        run: npm ci

      - name: Собрать .dmg и .zip
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          CI: true
        run: |
          source scripts/desktop-signing-env.sh
          bash scripts/build-desktop-macos.sh
          ls -lh apps/desktop/release/

      - name: Создать git tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "ZhurAI Agent ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Опубликовать GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZhurAI Agent ${{ steps.version.outputs.tag }}
          prerelease: ${{ github.ref == 'refs/heads/dev' }}
          generate_release_notes: true
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          fail_on_unmatched_files: true
