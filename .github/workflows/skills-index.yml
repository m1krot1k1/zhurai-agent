name: Build Skills Index

on:
  schedule:
    # Run twice daily: 6 AM and 6 PM UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths:
      - 'scripts/build_skills_index.py'
      - '.github/workflows/skills-index.yml'

permissions:
  contents: write

jobs:
  build-index:
    # Only run on the upstream repository, not on forks
    if: github.repository == 'm1krot1k1/zhurai-agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need the full history and token to push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx==0.28.1 pyyaml==6.0.2

      - name: Build skills index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_skills_index.py

      - name: Upload index artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: skills-index
          path: website/static/api/skills-index.json
          retention-days: 7

      - name: Deploy skills-index.json to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/static/api/skills-index.json
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to skills-index.json — skipping commit."
          else
            git commit -m "chore(skills-index): update skills-index.json [skip ci]"
            git push
          fi
